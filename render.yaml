services:
  - type: web
    name: agent-tc-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
      - key: SUPABASE_SCHEMA
        value: public
      - key: SUPABASE_TABLE_PREFIX
        value: agent_tc_
      - key: AGENT_TC_BACKEND
        value: supabase
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "120"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "6000"
